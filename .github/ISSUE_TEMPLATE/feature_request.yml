name: Feature Request / BEP Draft
description: Propose a new feature or enhancement. Significant changes can become a BEP.
title: "feat: "
labels: ["enhancement", "needs-discussion"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal! Please describe the feature clearly.
        For **architectural changes or new protocols**, consider opening a [BEP (BESSAI Enhancement Proposal)](https://github.com/bess-solutions/open-bess-edge/blob/main/docs/bep/BEP-0001.md) via GitHub Discussions.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who is impacted?
      placeholder: "As a BESS operator, I need X because currently Y is not possible without Z."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed implementation or approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider and why did you reject them?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      multiple: true
      options:
        - New protocol driver (Modbus / DNP3 / IEC 61850 / OCPP / others)
        - New hardware profile
        - AI / ML (DRL training, BESSAIEvolve, XAI)
        - Compliance / Standards (IEC 62443, IEEE 2030.5, VPP)
        - Telemetry / Observability
        - Security
        - Performance / Scalability
        - Developer experience (CLI, Makefile, docs)
        - Other
    validations:
      required: true

  - type: dropdown
    id: bep
    attributes:
      label: Does this require a BEP?
      description: Significant protocol changes, new AI modules, or governance changes need a BEP.
      options:
        - "No — small enhancement"
        - "Maybe — happy to discuss"
        - "Yes — I will draft a BEP"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution Interest
      options:
        - label: I am willing to implement this feature and open a PR
        - label: I need help with the implementation
        - label: I can provide testing / review only
