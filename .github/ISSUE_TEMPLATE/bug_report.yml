name: Bug Report
description: Report a reproducible bug in BESSAI Edge Gateway
title: "bug: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below carefully.
        **Note:** for security vulnerabilities, use [private disclosure](https://github.com/bess-solutions/open-bess-edge/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens, but I expected Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Configure .env with ...
        2. Run `make simulate`
        3. Observe error in ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Paste relevant log output (structured JSON logs, stack traces, etc.)
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      multiple: true
      options:
        - Protocol Driver (Modbus / IEC 61850 / IEEE 2030.5)
        - SafetyGuard
        - DRL Arbitrage Agent (ONNX)
        - BESSAIEvolve (weekly evolution)
        - AI-IDS (anomaly detection)
        - CMg data ingestion
        - Telemetry / Metrics / MQTT / GCP
        - Docker / Docker Compose
        - CI/CD / GitHub Actions
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BESSAI Version
      placeholder: "v2.10.0 or git SHA"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Runtime Platform
      options:
        - Linux (x86-64)
        - Linux (arm64 / Raspberry Pi)
        - macOS
        - Windows (WSL2)
        - Docker (amd64)
        - Docker (arm64)
        - GitHub Codespaces
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12.3"

  - type: textarea
    id: hardware
    attributes:
      label: Hardware Context (if relevant)
      description: Inverter model, BMS model, connection type
      placeholder: "Huawei SUN2000-10KTL, Modbus TCP over LAN"
