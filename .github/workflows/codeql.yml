name: CodeQL Security Analysis (SAST)

# OpenSSF Scorecard: SAST check — CodeQL is the recommended tool.
# This workflow analyzes Python code for security vulnerabilities
# and uploads results to GitHub Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every Wednesday at 08:00 UTC
    - cron: "0 8 * * 3"

permissions: read-all

jobs:
  analyze:
    name: CodeQL Analysis (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write  # Required to upload SARIF to GitHub Security tab

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Initialize CodeQL — this sets up the CodeQL analysis environment.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@1bb15d06a6fbb5d9d9ffd228746bf8ee208caec8  # codeql-bundle-v2.20.5
        with:
          languages: ${{ matrix.language }}
          # Extend with security-extended suite for comprehensive analysis
          queries: security-extended,security-and-quality

      # Autobuild attempts to build any compiled languages (not needed for Python)
      - name: Autobuild
        uses: github/codeql-action/autobuild@1bb15d06a6fbb5d9d9ffd228746bf8ee208caec8  # codeql-bundle-v2.20.5

      # Run CodeQL Analysis and upload SARIF results
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@1bb15d06a6fbb5d9d9ffd228746bf8ee208caec8  # codeql-bundle-v2.20.5
        with:
          category: "/language:${{ matrix.language }}"
          # Upload SARIF to GitHub Security tab automatically
          upload: always
