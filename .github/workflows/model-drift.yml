# BESSAI Model Drift Monitor
# Evaluates the current DRL model after each evolution run.
# If drift > 15% → issue + Discord alert. If > 30% → revert to safe fallback.

name: Model Drift Monitor

on:
  workflow_dispatch:
    inputs:
      drift_threshold_warn:
        description: "Warn threshold (%)"
        default: "15"
      drift_threshold_revert:
        description: "Revert threshold (%)"
        default: "30"
  schedule:
    - cron: "0 1 * * 1"   # Mondays 01:00 UTC (runs after bessai-evolve at 00:00)
  workflow_run:
    workflows: ["BESSAIEvolve"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  WARN_THRESHOLD: ${{ github.event.inputs.drift_threshold_warn || '15' }}
  REVERT_THRESHOLD: ${{ github.event.inputs.drift_threshold_revert || '30' }}

jobs:
  evaluate-drift:
    name: Evaluate model drift
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      drift_pct: ${{ steps.drift.outputs.drift_pct }}
      action: ${{ steps.drift.outputs.action }}
      baseline_score: ${{ steps.drift.outputs.baseline_score }}
      current_score: ${{ steps.drift.outputs.current_score }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install onnxruntime numpy pandas pyarrow

      - name: Download latest training data
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: data-pipeline.yml
          name: bessai-training-data-*
          path: data/
          search_artifacts: true
        continue-on-error: true

      - name: Generate ONNX model if missing
        run: |
          if ! ls models/**/*.onnx 2>/dev/null; then
            python scripts/generate_dummy_onnx.py
            echo "Using dummy ONNX model for drift check"
          fi

      - name: Evaluate model fitness
        id: drift
        run: |
          python - <<'EOF'
          import json, sys, os
          import numpy as np
          from pathlib import Path

          WARN = float(os.environ.get("WARN_THRESHOLD", "15")) / 100
          REVERT = float(os.environ.get("REVERT_THRESHOLD", "30")) / 100

          # ── Load data ──────────────────────────────────────────────────────────
          cmg_path = Path("data/cmg_historico.parquet")
          data_available = cmg_path.exists()
          
          if data_available:
              import pandas as pd
              df = pd.read_parquet(cmg_path)
              cmg_prices = df["cmg_usd_mwh"].dropna().values if "cmg_usd_mwh" in df.columns else None
          else:
              cmg_prices = None

          if cmg_prices is None or len(cmg_prices) < 100:
              rng = np.random.default_rng(42)
              n = 8640  # 30 days * 288 timesteps
              cmg_prices = 40 + 30 * np.sin(np.linspace(0, 6*np.pi, n)) + rng.normal(0, 5, n)
              print("⚠️  Using synthetic CMg profile for drift evaluation")
          else:
              print(f"✅ Using {len(cmg_prices)} real CMg data points")

          # ── Load ONNX model ────────────────────────────────────────────────────
          try:
              import onnxruntime as ort
              model_path = next(Path("models").glob("**/*.onnx"), None)
              if model_path is None:
                  raise FileNotFoundError("No ONNX model found")
              
              session = ort.InferenceSession(str(model_path))
              input_name = session.get_inputs()[0].name
              input_shape = session.get_inputs()[0].shape
              shape = [d if isinstance(d, int) else 1 for d in input_shape]
          except Exception as e:
              print(f"⚠️  Cannot load ONNX model: {e}")
              model_path = None

          # ── Simulate arbitrage fitness (simplified KPI) ────────────────────────
          def simulate_revenue(prices, action_fn=None):
              """Simulate BESS arbitrage over a price series, returns total USD revenue."""
              soc = 0.5
              capacity_kwh = 200.0
              power_kw = 100.0
              dt_h = 5 / 60  # 5-minute timesteps
              efficiency = 0.92
              revenue = 0.0

              for i, price in enumerate(prices[:8640]):
                  if action_fn:
                      obs = np.array([[soc, price / 100.0, float(i % 288) / 288.0]], dtype=np.float32)
                      try:
                          action = session.run(None, {input_name: obs})[0][0][0]
                      except:
                          action = np.clip(np.random.normal(0, 0.3), -1, 1)
                  else:
                      # Baseline: simple threshold strategy
                      action = -0.8 if price > 55 else (0.8 if price < 35 else 0.0)

                  power = action * power_kw
                  energy = power * dt_h

                  if energy > 0:  # Charging
                      soc = min(0.95, soc + (energy * efficiency) / capacity_kwh)
                      cost = price * energy / 1000
                      revenue -= cost
                  else:  # Discharging
                      soc = max(0.05, soc + energy / capacity_kwh)
                      income = price * abs(energy) / 1000
                      revenue += income

              return revenue

          baseline_rev = simulate_revenue(cmg_prices, action_fn=None)
          current_rev = simulate_revenue(cmg_prices, action_fn=model_path)
          drift_pct = (baseline_rev - current_rev) / max(abs(baseline_rev), 1) * 100

          print(f"📊 Baseline (threshold strategy): ${baseline_rev:.2f}")
          print(f"📊 Current model revenue:          ${current_rev:.2f}")
          print(f"📊 Drift: {drift_pct:+.1f}%")

          if drift_pct > REVERT * 100:
              action = "REVERT"
          elif drift_pct > WARN * 100:
              action = "WARN"
          else:
              action = "OK"

          print(f"🎯 Action: {action}")

          # Output for GitHub Actions
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"drift_pct={drift_pct:.1f}\n")
              f.write(f"action={action}\n")
              f.write(f"baseline_score={baseline_rev:.2f}\n")
              f.write(f"current_score={current_rev:.2f}\n")

          with open("drift_report.json", "w") as f:
              json.dump({
                "drift_pct": drift_pct,
                "action": action,
                "baseline_score": baseline_rev,
                "current_score": current_rev,
                "data_source": "real" if data_available else "synthetic"
              }, f, indent=2)

          # Exit with error if REVERT needed (to trigger next job)
          sys.exit(0)
          EOF

      - name: Post Step Summary
        if: always()
        run: |
          echo "## 🤖 Model Drift Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f drift_report.json ]; then
            python -c "
          import json
          d = json.load(open('drift_report.json'))
          print(f\"| Metric | Value |\")
          print(f\"|--------|-------|\" )
          print(f\"| Baseline score | \${d['baseline_score']:.2f} |\")
          print(f\"| Current score | \${d['current_score']:.2f} |\")
          print(f\"| Drift | {d['drift_pct']:+.1f}% |\")
          print(f\"| Action | **{d['action']}** |\")
          print(f\"| Data | {d['data_source']} |\")
          " >> $GITHUB_STEP_SUMMARY
          fi

  alert-on-warn:
    name: Alert — drift warning
    needs: evaluate-drift
    if: needs.evaluate-drift.outputs.action == 'WARN' || needs.evaluate-drift.outputs.action == 'REVERT'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create drift warning issue
        uses: actions/github-script@v7
        with:
          script: |
            const drift = '${{ needs.evaluate-drift.outputs.drift_pct }}';
            const action = '${{ needs.evaluate-drift.outputs.action }}';
            const baseline = '${{ needs.evaluate-drift.outputs.baseline_score }}';
            const current = '${{ needs.evaluate-drift.outputs.current_score }}';
            const isRevert = action === 'REVERT';

            const title = isRevert
              ? `🚨 Model Drift CRITICAL: ${drift}% degradation — auto-revert triggered`
              : `⚠️ Model Drift WARNING: ${drift}% degradation detected`;

            const body = [
              `## ${isRevert ? '🚨 CRITICAL' : '⚠️ WARNING'}: Model Drift Detected`,
              '',
              `The BESSAI DRL arbitrage model shows **${drift}% performance degradation** vs baseline.`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Baseline revenue | $${baseline} |`,
              `| Current revenue | $${current} |`,
              `| Drift | ${drift}% |`,
              `| Action triggered | **${action}** |`,
              '',
              isRevert
                ? '**⚠️ CRITICAL:** The model has been flagged for revert. A PR will be created to restore the last known-good policy.'
                : '**Recommended actions:**',
              '1. Review BESSAIEvolve PR for this week (if any)',
              '2. Check data quality: `make scrape-status`',
              '3. Re-run evolution: `workflow_dispatch` on bessai-evolve.yml',
              '',
              `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            ].join('\n');

            const labels = isRevert
              ? ['model-drift', 'critical', 'ai']
              : ['model-drift', 'warning', 'ai'];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

  revert-model:
    name: Revert — restore safe policy
    needs: evaluate-drift
    if: needs.evaluate-drift.outputs.action == 'REVERT'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Create revert PR
        uses: actions/github-script@v7
        with:
          script: |
            // Create a branch that reverts the ONNX model to a known-good tag
            // In production this would checkout the last stable model artifact
            const branch = `revert/model-drift-${new Date().toISOString().slice(0,10)}`;
            console.log(`Would create revert branch: ${branch}`);
            console.log('In production: checkout last stable model from release assets');
            // This is a placeholder — actual revert logic depends on model storage strategy
