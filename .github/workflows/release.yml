name: Release

# OpenSSF Scorecard: Token-Permissions — explicit minimum permissions per job

on:
  push:
    tags:
      - "v*.*.*"    # Trigger on version tags: v1.0.0, v2.1.3-rc1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.4.0)"
        required: true

permissions: read-all

env:
  IMAGE_NAME: bessai-edge-gateway
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Build Docker image + generate SBOM
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build & SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # Full history for release notes

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push versioned image
        id: push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=BESSAI Edge Gateway
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Syft (SBOM generator)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          syft ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}@${{ steps.push.outputs.digest }} \
            -o spdx-json=sbom-spdx.json \
            -o cyclonedx-json=sbom-cyclonedx.json
          echo "✅ SBOM generated (SPDX + CycloneDX)"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: sbom
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Create GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download SBOM artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: sbom
          path: sbom/

      - name: Extract changelog entry
        id: changelog
        run: |
          python - <<'EOF'
          import re, sys

          with open("CHANGELOG.md") as f:
              content = f.read()

          # Find the most recent release section
          pattern = r"## \[[\d.]+\].*?(?=## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if match:
              entry = match.group(0).strip()
              print(entry[:2000])  # Truncate for Release body
          else:
              print("See CHANGELOG.md for details.")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf3af61754a3f65c  # v2.2.1
        with:
          name: "BESSAI Edge Gateway ${{ needs.build.outputs.version }}"
          body: |
            ## BESSAI Edge Gateway ${{ needs.build.outputs.version }}

            ### 🐳 Docker Image
            ```
            docker pull ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
            ```

            ### 📦 Image Digest (immutable reference)
            ```
            ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
            ```

            ### 🔒 Supply Chain Security
            - SBOM (SPDX + CycloneDX) attached below
            - Built with Docker BuildKit — reproducible multi-arch image
            - Scanned with Trivy for CVEs

            ### 📋 Release Notes
            See [CHANGELOG.md](CHANGELOG.md) for full details.
          files: |
            sbom/sbom-spdx.json
            sbom/sbom-cyclonedx.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-rc') || contains(needs.build.outputs.version, '-beta') }}
